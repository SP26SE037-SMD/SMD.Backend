name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set IMAGE TAG (commit SHA)
      - name: Set IMAGE_TAG
        run: echo "IMAGE_TAG=$(git rev-parse --short HEAD)" >> $GITHUB_ENV

      # 3. Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build image
      - name: Build Docker image
        run: |
          docker build -t taikt2004/smd:${IMAGE_TAG} .
          docker tag taikt2004/smd:${IMAGE_TAG} taikt2004/smd:latest

      # 5. Push image
      - name: Push Docker image
        run: |
          docker push taikt2004/smd:${IMAGE_TAG}
          docker push taikt2004/smd:latest

      # 6. Deploy via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST}}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY}}
          port: 22
          script: |
            # Pull image mới
            docker pull taikt2004/smd:${IMAGE_TAG}

            # Stop container cũ
            sudo docker ps -q --filter "publish=8080" | xargs -r sudo docker stop            
            sudo docker ps -aq --filter "publish=8080" | xargs -r sudo docker rm
            # Run container mới
            docker run -d \
              --name smd \
              -p 8080:8080 \
              -env DB_URL="${{ secrets.DB_URL }}" \
              -env DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -env DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -env JWT_SIGNER_KEY="${{ secrets.JWT_SIGNER_KEY }}" \
              -env CLIENT_ID="${{ secrets.CLIENT_ID }}" \
              -env CLIENT_SECRET="${{ secrets.CLIENT_SECRET }}" \
              -env REFRESH_TOKEN="${{ secrets.REFRESH_TOKEN }}" \
              -env SENDER_EMAIL="${{ secrets.SENDER_EMAIL }}" \
              -env GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              --restart unless-stopped \
              taikt2004/smd:${IMAGE_TAG}

            # Cleanup image cũ
            docker image prune -af
