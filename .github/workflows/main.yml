name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set IMAGE_TAG (auto tăng)
      - name: Set IMAGE_TAG
        run: echo "IMAGE_TAG=${{ github.run_number }}" >> $GITHUB_ENV

      # 3. Login Docker Hub
      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 4. Build Docker image
      - name: Build Docker image
        run: |
          docker build -t taikt2004/smd:${IMAGE_TAG} .
          docker tag taikt2004/smd:${IMAGE_TAG} taikt2004/smd:latest

      # 5. Push Docker image
      - name: Push Docker image
        run: |
          docker push taikt2004/smd:${IMAGE_TAG}
          docker push taikt2004/smd:latest

      # 6. Deploy to EC2 via SSH
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # nhận biến từ GitHub
            IMAGE_TAG=${{ env.IMAGE_TAG }}

            echo "Deploying version: $IMAGE_TAG"

            # Pull image mới
            sudo docker pull taikt2004/smd:$IMAGE_TAG

            # Stop & remove container cũ
            sudo docker stop smd || true
            sudo docker rm smd || true

            # Run container mới
            sudo docker run -d \
              --name smd \
              -p 8080:8080 \
              -e DB_URL="${{ secrets.DB_URL }}" \
              -e DB_USERNAME="${{ secrets.DB_USERNAME }}" \
              -e DB_PASSWORD="${{ secrets.DB_PASSWORD }}" \
              -e JWT_SIGNER_KEY="${{ secrets.JWT_SIGNER_KEY }}" \
              -e CLIENT_ID="${{ secrets.CLIEND_ID }}" \
              -e CLIENT_SECRET="${{ secrets.CLIEND_SECRET }}" \
              -e REFRESH_TOKEN="${{ secrets.REFRESH_TOKEN }}" \
              -e SENDER_EMAIL="${{ secrets.SENDER_EMAIL }}" \
              -e GEMINI_API_KEY="${{ secrets.GEMINI_API_KEY }}" \
              --restart unless-stopped \
              taikt2004/smd:$IMAGE_TAG

            # Cleanup image cũ
            sudo docker image prune -af
