spring:
  application:
    name: SMD
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  # ==========================================
  # DATABASE CONFIGURATION
  # ==========================================
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ==========================================
  # JPA/HIBERNATE CONFIGURATION
  # ==========================================
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
        # CHÚ Ý: Để validate trong production, none trong development với Flyway
        ddl-auto: validate
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
    open-in-view: false

  # ==========================================
  # EMAIL CONFIGURATION
  # ==========================================
  gmail:
    client-id: ${CLIEND_ID}
    client-secret: ${CLIEND_SECRET}
    refresh-token: ${REFRESH_TOKEN}
    sender: ${SENDER_EMAIL}
  # ==========================================
  # FLYWAY CONFIGURATION
  # ==========================================
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration
    sql-migration-prefix: V
    sql-migration-separator: __
    sql-migration-suffixes: .sql
    validate-on-migrate: true
    out-of-order: false
    placeholder-replacement: false

# ==========================================
# JWT CONFIGURATION
# ==========================================
jwt:
  signer-key: ${JWT_SIGNER_KEY}
  valid-duration: 360000 # in seconds (1 hour)
  refreshable-duration: 604800 # in seconds (7 days)

# ==========================================
# SPRINGDOC OPENAPI/SWAGGER CONFIGURATION
# ==========================================
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    tags-sorter: alpha
    operations-sorter: alpha
    doc-expansion: none
    display-request-duration: true

# ==========================================
# LOGGING CONFIGURATION
# ==========================================
logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.flywaydb: INFO
    com.example.smd: DEBUG
# =========================================
# GEMINI GOOGLE
# =========================================
# Cấu hình Custom cho dự án
gemini:
  api-key: ${GEMINI_API_KEY}
  generate:
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent
  check:
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent
  vector-embedding:
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-embedding-001:embedContent
  upload-file:
    url: https://generativelanguage.googleapis.com/upload/v1beta/files
  analyze-pdf:
    url: https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent

app:
  webhook:
    secret: ${WEBHOOK_SECRET:smd-webhook-secret-2026}
  appscript:
    deploy-url: ${APPSCRIPT_DEPLOY_URL}
---
# ==========================================
# DEVELOPMENT PROFILE
# ==========================================
spring:
  config:
    activate:
      on-profile: dev
  jpa:
    # Trong dev, có thể dùng validate hoặc none
    # none: Hibernate không tự động tạo/update schema, Flyway toàn quyền
    hibernate:
      ddl-auto: none
  flyway:
    clean-disabled: false # Cho phép clean DB trong dev

---
# ==========================================
# PRODUCTION PROFILE
# ==========================================
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ...
    username: ...
    password: ...
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate # Chỉ validate, không tự động thay đổi schema
  flyway:
    clean-disabled: true # KHÔNG BAO GIỜ clean DB trong production
    baseline-on-migrate: false

logging:
  level:
    org.hibernate.SQL: INFO
    org.hibernate.type.descriptor.sql.BasicBinder: INFO
